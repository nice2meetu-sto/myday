name: Supabase Keepalive

# 무료 티어 7일 미접속 정지 방지 — 3일마다 가벼운 SELECT
on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "https://ukdqgghzxwbyiqometsp.supabase.co/rest/v1/notes?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -o /dev/null -w "status: %{http_code}\n"
